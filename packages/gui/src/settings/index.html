<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'self'; script-src 'self'"
    />
    <title>Perch Settings</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <div class="settings">
      <main class="sections">
        <section class="section">
          <header class="header">
            <span class="title">Stack Repositories</span>
            <span class="subtitle">The first repo is the default.</span>
          </header>
          <hr class="rule" />
          <div id="rows" class="rows"></div>
          <div id="error" class="error" hidden></div>
          <footer class="actions">
            <button id="add" class="btn btn-primary">Add repo…</button>
          </footer>
        </section>

        <div id="plugins"></div>
      </main>
    </div>
    <script src="./settings.js"></script>
  </body>
</html>
